{% extends 'base.html' %}

{% block title %}Главная страница{% endblock %}

{% block content %}
<body class="tasks-page">
    <div class="tasks-container">
        <div class="server-profile-bar">
            <div class="server-info">
                <i class='bx bx-server'></i>
                <span class="server-name">TASK MANAGER</span>
            </div>
            <div class="profile-info">
                <i class='bx bx-user-circle'></i>
                <span class="profile-name">Имя пользователя</span>
                <i class='bx bx-chevron-down'></i>
            </div>
        </div>
        <div class="tasks-header">
            <h1 class="text">Ваши задачи</h1>
        </div>
        <div class="back">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Всего</h3>
                    <div class="stat-number" id="totalTasks">0</div>
                </div>
                <div class="stat-card">
                    <h3>Выполнено</h3>
                    <div class="stat-number" id="completedTasks">0</div>
                </div>
                <div class="stat-card">
                    <h3>Активных</h3>
                    <div class="stat-number" id="activeTasks">0</div>
                </div>
                <div class="stat-card">
                    <h3>Просрочено</h3>
                    <div class="stat-number" id="overdueTasks">0</div>
                </div>
            </div>
            <div class="filters-section">
                <form action="/create">
                    <div class="create-button">
                        <button type="submit" class="create-btn">Cоздать задачу +</button>
                    </div>
                </form>
                <div class="search-wrapper">
                    <div class="filter-button">
                        <button class="filter-btn" ><i class="bx bx-filter"></i></button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="        Найти задачу">
                        <i class="bx bx-search"></i>
                    </div>
                </div>
            </div>
            <div class="tasks-grid" id="tasksGrid">
                <div class="empty-state">Тут немного пусто</div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
